<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b2f6b" />
    <title>RMVI GCOS Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f4f7fb;
        color: #10213f;
      }

      main {
        width: min(680px, calc(100% - 32px));
        border: 1px solid #d8e2f2;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 18px 44px rgba(8, 31, 70, 0.12);
      }

      span {
        color: #d6a631;
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0;
        color: #0b2f6b;
        font-size: clamp(30px, 6vw, 48px);
        line-height: 1;
      }

      p {
        color: #345173;
        line-height: 1.55;
      }

      a {
        min-height: 44px;
        border-radius: 7px;
        background: #0b2f6b;
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        font-weight: 850;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span>RMVI GCOS offline mode</span>
      <h1>You can keep working offline.</h1>
      <p>The installed RMVI GCOS app could not reach the internet. Open the app home screen to use cached workstations, draft reports, prepare ChurchMail, and queue actions until the connection returns.</p>
      <a href="/">Open cached workstation</a>
    </main>
  </body>
</html>
